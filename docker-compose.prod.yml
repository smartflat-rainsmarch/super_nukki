version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/app/storage:ro
    depends_on:
      - api
      - web
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ui2psd
      POSTGRES_USER: ui2psd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ui2psd"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redisdevpass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisdevpass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: postgresql://ui2psd:${POSTGRES_PASSWORD}@postgres:5432/ui2psd
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /app/storage
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: postgresql://ui2psd:${POSTGRES_PASSWORD}@postgres:5432/ui2psd
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /app/storage
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=warning --concurrency=2
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ""
    command: npm run start
    restart: always

volumes:
  postgres_data:
