version: "3.9"

# On-premises deployment: single-host, all-in-one
# Usage: docker compose -f docker-compose.onprem.yml up -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "${HOST_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/app/storage:ro
    depends_on:
      - api
      - web
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ui2psd}
      POSTGRES_USER: ${DB_USER:-ui2psd}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ui2psd}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: postgresql://${DB_USER:-ui2psd}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ui2psd}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_PATH: /app/storage
      LICENSE_KEY: ${LICENSE_KEY:-}
      GPU_ENABLED: ${GPU_ENABLED:-false}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-2}
    restart: always

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: postgresql://${DB_USER:-ui2psd}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ui2psd}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      STORAGE_PATH: /app/storage
      GPU_ENABLED: ${GPU_ENABLED:-false}
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=warning --concurrency=${WORKER_CONCURRENCY:-2}
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ""
    command: npm run start
    restart: always

volumes:
  postgres_data:
